<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Scentpedia 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  body{font-family:"Pretendard",system-ui,sans-serif;background:#f7f4ef;color:#1a1916;margin:0;padding:28px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:#7c7870;font-size:14px;margin-bottom:22px}
  .lock{background:#fff;border:1px solid #e7e2d9;border-radius:14px;padding:22px;max-width:380px}
  .lock input{width:100%;padding:13px;border:1px solid #e7e2d9;border-radius:10px;font-size:15px;margin:10px 0}
  button{font-family:inherit;font-weight:700;cursor:pointer;border:0;border-radius:10px;padding:12px 18px;background:#1a1916;color:#fff;font-size:15px}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:#fff;border:1px solid #e7e2d9;border-radius:14px;padding:16px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:#b14a5f}
  .stat .l{font-size:12.5px;color:#7c7870;margin-top:4px}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e7e2d9;border-radius:14px;overflow:hidden;font-size:13.5px}
  th,td{text-align:left;padding:11px 13px;border-bottom:1px solid #efebe3}
  th{background:#f1ece4;font-size:12px;color:#74726c}
  tr:last-child td{border-bottom:0}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .ok{background:#e3f5ea;color:#2e8b57}.no{background:#fdeaea;color:#c0392b}
  .err{color:#c0392b;margin-top:10px;font-size:14px}
  .sec{background:#fff;border:1px solid #e7e2d9;border-radius:14px;padding:20px;margin-top:26px}
  .sec h2{font-size:18px;margin:0 0 4px}
  .sec .hint{color:#7c7870;font-size:13px;margin-bottom:14px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
  .fld input[type=text],.fld textarea{width:100%;padding:11px 13px;border:1px solid #e7e2d9;border-radius:10px;font-size:14px;font-family:inherit}
  .fld textarea{min-height:140px;resize:vertical;line-height:1.6}
  .fld input[type=file]{font-size:13px}
  .row2{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .preview{max-width:160px;border-radius:10px;margin-top:8px;display:none}
  .pk-row{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid #efebe3;border-radius:10px;margin-top:8px}
  .pk-row img{width:48px;height:48px;object-fit:cover;border-radius:8px}
  .pk-row .t{flex:1;font-size:14px;font-weight:700}
  .pk-row a{font-size:12px;color:#b14a5f}
  .del{background:#fdeaea;color:#c0392b;padding:7px 12px;font-size:13px}
  .msg{font-size:13px;margin-top:8px;min-height:16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧪 Scentpedia 관리자</h1>
  <div class="sub">가입 이력 · 활동 통계</div>
  <div id="lock" class="lock">
    <div style="font-weight:700">관리자 키 입력</div>
    <input id="key" type="password" placeholder="ADMIN_KEY" autocomplete="off">
    <button id="go">확인</button>
    <div class="err" id="err"></div>
  </div>
  <div id="dash" style="display:none">
    <div class="stats" id="stats"></div>
    <table><thead><tr><th>닉네임</th><th>이메일</th><th>가입일</th><th>최근 접속</th><th>인증</th></tr></thead>
      <tbody id="rows"></tbody></table>

    <!-- Editor's Pick 관리 -->
    <div class="sec" id="pickSec">
      <h2>📝 에디터 추천 글 (Editor's Pick)</h2>
      <div class="hint">작성하면 홈에 노출되고 <b>/pick/주소</b>로 구글에 검색·인덱싱됩니다.</div>
      <div class="fld"><label>제목 *</label><input id="pkTitle" type="text" placeholder="예: 가을에 어울리는 우디 향수 5선"></div>
      <div class="fld"><label>한 줄 요약 (목록·미리보기에 표시)</label><input id="pkSummary" type="text" placeholder="선선해진 날씨에 딱인 따뜻한 우디 향수를 골랐어요"></div>
      <div class="fld"><label>본문 (요약·소개글 — 블로그 링크만 걸 거면 짧게 써도 OK)</label><textarea id="pkBody" placeholder="여기에 추천 내용을 자유롭게 작성하세요. 빈 줄로 문단을 나눌 수 있어요."></textarea></div>
      <div class="fld"><label>외부 링크 (네이버 블로그 등 — 입력하면 '블로그에서 전문 보기' 버튼이 생겨요)</label><input id="pkLink" type="text" placeholder="https://blog.naver.com/내아이디/글번호"></div>
      <div class="fld"><label>대표 이미지 (직접 첨부)</label><input id="pkImage" type="file" accept="image/*"><img id="pkPreview" class="preview" alt="미리보기"></div>
      <div class="fld"><label>주소(slug) — 비우면 자동 생성</label><input id="pkSlug" type="text" placeholder="autumn-woody-2026"></div>
      <div class="row2">
        <label style="font-weight:600;font-size:13px"><input id="pkPublished" type="checkbox" checked> 공개</label>
        <button id="pkSave">저장 / 발행</button>
      </div>
      <div class="msg" id="pkMsg"></div>
      <div id="pkList" style="margin-top:16px"></div>
    </div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
async function load(key){
  const r=await fetch("/api/admin?key="+encodeURIComponent(key));
  const j=await r.json();
  if(!j.ok){ $("#err").textContent = j.reason==="unauthorized" ? "키가 올바르지 않아요." : "설정 오류: "+(j.reason||""); return; }
  sessionStorage.setItem("adminKey", key);
  $("#lock").style.display="none"; $("#dash").style.display="";
  const s=j.stats||{};
  $("#stats").innerHTML=[["가입자",j.total],["구매평",s.reviews],["게시글",s.posts],["댓글",s.comments],["캘린더",s.diary]]
    .map(([l,n])=>`<div class="stat"><div class="n">${n??0}</div><div class="l">${l}</div></div>`).join("");
  const fmt=d=>d?new Date(d).toLocaleString("ko-KR"):"-";
  $("#rows").innerHTML=(j.users||[]).map(u=>`<tr>
    <td>${u.nickname||"-"}</td><td>${u.email||"-"}</td><td>${fmt(u.created_at)}</td><td>${fmt(u.last_sign_in_at)}</td>
    <td><span class="badge ${u.confirmed?"ok":"no"}">${u.confirmed?"완료":"대기"}</span></td></tr>`).join("");
  loadPicks();
}
$("#go").onclick=()=>load($("#key").value.trim());
$("#key").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#go").click(); });
const saved=sessionStorage.getItem("adminKey"); if(saved) load(saved);

/* ---------- Editor's Pick 관리 ---------- */
let pkImageData=null;
const adminKey=()=>sessionStorage.getItem("adminKey")||"";
// 업로드 전 브라우저에서 리사이즈·압축 (아이폰 사진이 커서 용량 초과로 실패하는 문제 방지)
function compressImage(file, maxDim=1280, quality=0.82){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>maxDim||h>maxDim){ const s=Math.min(maxDim/w,maxDim/h); w=Math.round(w*s); h=Math.round(h*s); }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",quality));
      };
      img.onerror=()=>reject(new Error("이미지를 읽을 수 없어요"));
      img.src=reader.result;
    };
    reader.onerror=()=>reject(new Error("파일을 읽을 수 없어요"));
    reader.readAsDataURL(file);
  });
}
$("#pkImage").addEventListener("change",async e=>{
  const f=e.target.files[0]; const msg=$("#pkMsg");
  if(!f){ pkImageData=null; return; }
  try{
    msg.style.color="#7c7870"; msg.textContent="이미지 처리 중…";
    pkImageData=await compressImage(f);
    const img=$("#pkPreview"); img.src=pkImageData; img.style.display="block";
    const kb=Math.round(pkImageData.length*0.75/1024);
    msg.style.color="#2e8b57"; msg.textContent=`이미지 준비됨 (약 ${kb}KB)`;
  }catch(err){ pkImageData=null; msg.style.color="#c0392b"; msg.textContent="이미지 처리 실패: "+err.message; }
});
async function loadPicks(){
  try{
    const r=await fetch("/api/editor?key="+encodeURIComponent(adminKey()));
    const j=await r.json(); if(!j.ok) return;
    $("#pkList").innerHTML=(j.picks||[]).map(p=>`<div class="pk-row">
      ${p.image_url?`<img src="${p.image_url}" alt="">`:""}
      <div class="t">${p.title}${p.published?"":" <span class='badge no'>비공개</span>"}<br>
        <a href="/pick/${encodeURIComponent(p.slug)}" target="_blank">/pick/${p.slug} ↗</a></div>
      <button class="del" data-id="${p.id}">삭제</button>
    </div>`).join("")||"<div class='hint'>아직 글이 없어요.</div>";
    $("#pkList").querySelectorAll(".del").forEach(b=>b.onclick=()=>delPick(b.dataset.id));
  }catch(e){}
}
async function savePick(){
  const msg=$("#pkMsg"); const title=$("#pkTitle").value.trim();
  if(!title){ msg.style.color="#c0392b"; msg.textContent="제목을 입력하세요."; return; }
  msg.style.color="#7c7870"; msg.textContent="저장 중…";
  const payload={
    title, summary:$("#pkSummary").value.trim(), body:$("#pkBody").value,
    link_url:$("#pkLink").value.trim()||undefined,
    slug:$("#pkSlug").value.trim()||undefined, published:$("#pkPublished").checked,
  };
  if(pkImageData) payload.image=pkImageData;
  try{
    const r=await fetch("/api/editor?key="+encodeURIComponent(adminKey()),{
      method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    let j;
    try{ j=await r.json(); }
    catch(parseErr){
      msg.style.color="#c0392b";
      msg.textContent = r.status===413 ? "이미지 용량이 너무 커요. 더 작은 사진으로 시도해 주세요." : "서버 오류("+r.status+"). 잠시 후 다시 시도해 주세요.";
      return;
    }
    if(!j.ok){ msg.style.color="#c0392b"; msg.textContent="실패: "+(j.message||j.reason||""); return; }
    msg.style.color="#2e8b57"; msg.textContent="저장됐어요! → /pick/"+j.pick.slug;
    $("#pkTitle").value="";$("#pkSummary").value="";$("#pkBody").value="";$("#pkSlug").value="";$("#pkLink").value="";
    $("#pkImage").value="";$("#pkPreview").style.display="none";pkImageData=null;
    loadPicks();
  }catch(e){ msg.style.color="#c0392b"; msg.textContent="오류: "+e; }
}
async function delPick(id){
  if(!confirm("이 글을 삭제할까요?")) return;
  await fetch("/api/editor?key="+encodeURIComponent(adminKey())+"&id="+id,{method:"DELETE"});
  loadPicks();
}
$("#pkSave").onclick=savePick;
</script>
</body>
</html>
